<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JPG to PNG Converter - ConvertHub</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f7fb;
color:#222;
}

header{
background:#111827;
color:white;
padding:18px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:900px;
margin:40px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

h1{
text-align:center;
margin-bottom:10px;
}

p{
text-align:center;
color:#666;
margin-bottom:30px;
}

.upload-box{
border:2px dashed #2563eb;
padding:40px;
border-radius:15px;
text-align:center;
}

input[type=file]{
margin-top:20px;
}

button{
margin-top:20px;
padding:14px 30px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

#preview{
margin-top:30px;
text-align:center;
}

#preview img{
max-width:100%;
border-radius:10px;
margin-bottom:20px;
}

footer{
margin-top:50px;
background:#111827;
color:white;
padding:20px;
text-align:center;
}
</style>

</head>

<body>

<header>
ConvertHub
</header>

<div class="container">

<h1>JPG to PNG Converter</h1>

<p>اپنی JPG تصویر منتخب کریں اور ایک کلک میں PNG میں تبدیل کریں۔</p>

<div class="upload-box">
<script>
function convertImage(){

const input = document.getElementById("imageInput");
const preview = document.getElementById("preview");

if(input.files.length===0){
alert("براہ کرم پہلے JPG تصویر منتخب کریں۔");
return;
}

const file=input.files[0];

const reader=new FileReader();

reader.onload=function(e){

preview.innerHTML=`
<img src="${e.target.result}" id="imgPreview">

<br><br>

<a id="downloadBtn">
<button>Download PNG</button>
</a>
`;

const img=document.getElementById("imgPreview");

img.onload=function(){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.drawImage(img,0,0);

const png=canvas.toDataURL("image/png");

document.getElementById("downloadBtn").href=png;
document.getElementById("downloadBtn").download="converthub-image.png";

};

};

reader.readAsDataURL(file);

}
</script>

</div>

<footer>
© 2026 ConvertHub - All Rights Reserved
</footer>

</body>
</html>
<input type="file" id="imageInput" accept=".jpg,.jpeg">

<br>

<button onclick="convertImage()">Convert to PNG</button>

</div>

<div id="preview"></div>
