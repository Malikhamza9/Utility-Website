<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PNG to JPG Converter - ConvertHub</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f7fb;
margin:0;
padding:40px;
text-align:center;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

button{
padding:12px 25px;
margin-top:20px;
cursor:pointer;
}

img{
max-width:100%;
margin-top:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>PNG to JPG Converter</h1>

<p>Select a PNG image and convert it to JPG.</p>

<input type="file" id="imageInput" accept=".png">

<br>

<button onclick="convertImage()">Convert to JPG</button>

<div id="preview"></div>

</div>

<script>
function convertImage(){

const input=document.getElementById("imageInput");

if(input.files.length===0){
alert("Please select a PNG image.");
return;
}

const file=input.files[0];
const reader=new FileReader();

reader.onload=function(e){

const img=new Image();

img.onload=function(){

const canvas=document.createElement("canvas");
const ctx=canvas.getContext("2d");

canvas.width=img.width;
canvas.height=img.height;

ctx.fillStyle="#ffffff";
ctx.fillRect(0,0,canvas.width,canvas.height);
ctx.drawImage(img,0,0);

const jpg=canvas.toDataURL("image/jpeg",0.95);

document.getElementById("preview").innerHTML=
'<a href="'+jpg+'" download="converthub-image.jpg"><button>Download JPG</button></a>';

};

img.src=e.target.result;

};

reader.readAsDataURL(file);

}
</script>

</body>
</html>
